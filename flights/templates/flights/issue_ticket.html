{% extends 'flights/base.html' %}
{% block title %}Issue Ticket{% endblock %}
{% block content %}
<div class='row justify-content-center'><div class='col-md-8'>
  <div class='card shadow'>
    <div class='card-header bg-warning'><h4>🎟 Issue New Ticket</h4></div>
    <div class='card-body'>
      <form method='post'>{% csrf_token %}
        {% for field in form %}
          <div class='mb-3'>
            <label class='form-label fw-bold'>{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
              <div class='text-danger small'>{{ field.errors }}</div>
            {% endif %}
          </div>
        {% endfor %}
        <button type='submit' class='btn btn-warning'>Issue Ticket</button>
        <a href='{% url "ticket-list" %}' class='btn btn-secondary ms-2'>Cancel</a>
      </form>
    </div>
  </div>
</div></div>
{% endblock %}
